# ================================================================
# zMPvPRooms - Main Configuration
# ================================================================
# Documentation: https://zmarkitos.gitbook.io/zmpvprooms 
# Run /zmrooms reload to apply changes without restarting.
# ================================================================

# ================================================================
# Do not modify this value, it is used to check for config updates.
# ================================================================
config-version: 1.0

settings:
  # Message language. Folder: /plugins/zMPvPRooms/lang/
  # Available files: ES, EN
  language: "EN"

  # Enables the betting module and its GUIs.
  # false = /zmrooms bet will show "coming soon".
  bets-enabled: false

  # Enables SQLite database for player statistics.
  # If disabled, /zmrooms stats will not be available.
  use-sqlite: true

  # Checks for updates on SpigotMC on startup and notifies admins.
  check-updates: true

  # Return spawn where players are teleported after leaving
  # a room. If not set, the main world spawn is used.
  # Use: /zmrooms setspawn (stand where you want it).
  # return-spawn: <auto-configured>

# ================================================================
# Arena protection
# ================================================================
room-protection:
  # Commands blocked while the player is inside a room
  # (playing or spectating). Do not include the "/" prefix.
  blacklist-commands:
    - "spawn"
    - "home"
    - "tpa"
    - "tpahere"
    - "warp"
    - "rtp"
    - "back"
    - "pv"
    - "ec"
    - "enderchest"
    - "menu"

  # true  → players can open chests, furnaces, etc. inside the arena.
  # false → any external inventory is blocked inside the room.
  allow-external-inventories: true

# ================================================================
# Integrations (Hooks)
# ================================================================
hooks:
  # Enables PlaceholderAPI. Registers prefixes:
  # %rooms_...%, %zmrooms_...%, %zmpvp_...%, %zmpvprooms_..%
  placeholderapi: true

  # Enables Vault for economy features (money bets).
  vault: true

  # Enables WorldGuard. Required for room creation and
  # automatic detection of arena boundaries/openings.
  worldguard: true

  clans:
    # Enables all clan providers.
    enabled: true

    # Enables UltimateClans / uClans provider.
    ultimateclans: true

    # Detection priority. The first available plugin will be used.
    provider-priority:
      - "UltimateClans"
      - "uClans"

# ================================================================
# Teams (only affects NORMAL rooms with more than 1v1)
# ================================================================
teams:
  # Team 1 name (supports & color codes).
  red-name: "&cRed Team"
  # Team 2 name (supports & color codes).
  blue-name: "&9Blue Team"

# ================================================================
# Duel bossbar
# ================================================================
duel-bossbar:
  # Enables bossbar for participants and spectators.
  enabled: true

  # Color: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
  color: "RED"

  # Style: SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20
  style: "SOLID"

  # Global fallback templates (used if no type-specific template exists).
  # Placeholders: %time%, %alive1%, %alive2%, %room%
  with-limit: "&cTime left: &f%time%s"
  no-limit: "&eNo limit: until one player dies"

  # Template for NORMAL rooms
  normal:
    with-limit: "&cNORMAL &8| &f%alive1%v%alive2% &8| &e%time%s"
    no-limit: "&aNORMAL &8| &f%alive1%v%alive2% &8| &7Deathmatch"

  # Template for CLAN rooms
  clan:
    with-limit: "&6CLAN &8| &f%alive1%v%alive2% &8| &e%time%s"
    no-limit: "&6CLAN &8| &f%alive1%v%alive2% &8| &7Until death/disconnect"

# ================================================================
# Leaderboards
# ================================================================
leaderboards:
  # Number of entries per category (recommended ≥ 10).
  size: 10

  # Cache refresh time in seconds.
  cache-seconds: 30

  # Personal stats cache lifetime in milliseconds.
  personal-cache-ms: 3000

# ================================================================
# Win celebration effects
# ================================================================
celebration:
  firework:
    # Enables fireworks for the winner in NORMAL 1v1 rooms.
    enabled: true

    # Enables fireworks for the winning clan in CLAN rooms.
    clan-enabled: true

    # Amount of rockets launched.
    count: 3

    # Rocket power (0 = ground explosion, 4 = max height).
    power: 1

    # Explosion flicker effect.
    flicker: true

    # Trail effect while flying.
    trail: true

    # Explosion colors. Valid values:
    # AQUA, BLACK, BLUE, FUCHSIA, GRAY, GREEN, LIME, MAROON,
    # NAVY, OLIVE, ORANGE, PURPLE, RED, SILVER, TEAL, WHITE, YELLOW
    colors:
      - "ORANGE"
      - "YELLOW"
      - "WHITE"

  sound:
    # Enables victory sound.
    enabled: true

    # Sound name (Bukkit Sound enum).
    name: "ENTITY_FIREWORK_ROCKET_LAUNCH"

    # Volume (0.0 – 1.0+).
    volume: 1.0

    # Pitch (0.5 = low, 2.0 = high).
    pitch: 1.0

  nearby-title:
    # Sends a victory title to nearby players outside rooms.
    enabled: true

    # Radius in blocks from the winner's position.
    radius: 10.0

    # Available placeholders: %winner%, %room%
    title: "&6%winner% &ewon!"
    subtitle: "&7Room: &f%room%"

    # Title animation (in ticks: 20 ticks = 1 second).
    fade-in: 10
    stay: 40
    fade-out: 10

# ================================================================
# Effects when joining a CLAN room
# ================================================================
clan-join-effects:
  # Enables all effects in this section.
  enabled: true

  title:
    # Enables welcome title when joining a CLAN room.
    enabled: true
    # Placeholders: %room%, %clan%
    text: "&6&lCLAN ROOM"
    subtitle: "&f%room% &7- &6%clan%"
    fade-in: 10
    stay: 40
    fade-out: 10

  actionbar:
    # Enables actionbar when joining a CLAN room.
    enabled: true
    # Placeholders: %clan%, %room%
    text: "&6Clan: &f%clan% &8| &eRoom: &f%room%"

  sound:
    # Enables sound when joining a CLAN room.
    enabled: true
    # Sound name (Bukkit Sound enum).
    name: "BLOCK_BEACON_ACTIVATE"
    volume: 1.0
    pitch: 1.15