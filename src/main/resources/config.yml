# ================================================================
# zMPvPRooms - Configuración Principal
# ================================================================
# Documentación: https://github.com/zMarkitos_/zMPvPRooms
# Requiere /zmrooms reload para aplicar cambios en caliente.
# ================================================================

settings:
  # Idioma de mensajes. Carpeta: /plugins/zMPvPRooms/lang/
  # Archivos disponibles: ES, EN
  language: "EN"

  # Activa el módulo de apuestas y sus GUIs.
  # false = el comando /zmrooms bet muestra "próximamente".
  bets-enabled: false

  # Habilita la base de datos SQLite para estadísticas de jugadores.
  # Si se desactiva, /zmrooms stats no estará disponible.
  use-sqlite: true

  # Spawn de retorno al que se teletransporta a los jugadores al salir de
  # una sala. Si no está configurado, se usa el spawn del mundo principal.
  # Usa: /zmrooms setspawn (parado en el lugar deseado).
  # return-spawn: <configurado automáticamente>

# ================================================================
# Protección de arena
# ================================================================
room-protection:
  # Lista de comandos bloqueados mientras el jugador está dentro de
  # una sala (jugando o como espectador). No uses la / al inicio.
  blacklist-commands:
    - "spawn"
    - "home"
    - "tpa"
    - "tpahere"
    - "warp"
    - "rtp"
    - "back"
    - "pv"
    - "ec"
    - "enderchest"
    - "menu"

  # true  → los jugadores pueden abrir cofres, hornos, etc. dentro del arena.
  # false → cualquier inventario externo está bloqueado dentro de la sala.
  allow-external-inventories: true

# ================================================================
# Integraciones (Hooks)
# ================================================================
hooks:
  # Activa PlaceholderAPI. Registra los prefijos:
  # %rooms_...%, %zmrooms_...%, %zmpvp_...%, %zmpvprooms_..%
  placeholderapi: true

  # Activa Vault para funciones de economía (apuestas monetarias).
  vault: true

  # Activa WorldGuard. Necesario para la creación de salas y detección
  # automática de entradas/huecos en las arenas.
  worldguard: true

  clans:
    # Activa todos los proveedores de clanes.
    enabled: true

    # Activa el proveedor UltimateClans / uClans.
    ultimateclans: true

    # Prioridad de detección. El primer plugin disponible será usado.
    provider-priority:
      - "UltimateClans"
      - "uClans"

# ================================================================
# Equipos (solo afecta salas NORMAL con más de 1v1)
# ================================================================
teams:
  # Nombre del equipo 1 (soporte de colores &).
  red-name: "&cRed Team"
  # Nombre del equipo 2 (soporte de colores &).
  blue-name: "&9Blue Team"

# ================================================================
# Bossbar del duelo
# ================================================================
duel-bossbar:
  # Activa la bossbar para participantes y espectadores.
  enabled: true

  # Color: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
  color: "RED"

  # Estilo: SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20
  style: "SOLID"

  # Plantillas globales de fallback (se usan si no hay plantilla por tipo).
  # Placeholders: %time%, %alive1%, %alive2%, %room%
  with-limit: "&cTime left: &f%time%s"
  no-limit: "&eNo limit: until one player dies"

  # Plantilla para salas NORMAL
  normal:
    with-limit: "&cNORMAL &8| &f%alive1%v%alive2% &8| &e%time%s"
    no-limit: "&aNORMAL &8| &f%alive1%v%alive2% &8| &7Deathmatch"

  # Plantilla para salas CLAN
  clan:
    with-limit: "&6CLAN &8| &f%alive1%v%alive2% &8| &e%time%s"
    no-limit: "&6CLAN &8| &f%alive1%v%alive2% &8| &7Until death/disconnect"

# ================================================================
# Tablas de clasificación (leaderboards)
# ================================================================
leaderboards:
  # Número de entradas por categoría (recomendado ≥ 10).
  size: 10

  # Tiempo en segundos entre refrescos del cache global.
  cache-seconds: 30

  # Tiempo en milisegundos de vida del cache de estadísticas personales.
  personal-cache-ms: 3000

# ================================================================
# Efectos de celebración al ganar
# ================================================================
celebration:
  firework:
    # Activa fuegos artificiales para el ganador de salas NORMAL 1v1.
    enabled: true

    # Activa fuegos artificiales para el clan ganador de salas CLAN.
    clan-enabled: true

    # Cantidad de cohetes disparados.
    count: 3

    # Potencia del cohete (0 = explota en suelo, 4 = máxima altura).
    power: 1

    # Efecto de parpadeo en la explosión.
    flicker: true

    # Efecto de estela en vuelo.
    trail: true

    # Colores de la explosión. Valores válidos:
    # AQUA, BLACK, BLUE, FUCHSIA, GRAY, GREEN, LIME, MAROON,
    # NAVY, OLIVE, ORANGE, PURPLE, RED, SILVER, TEAL, WHITE, YELLOW
    colors:
      - "ORANGE"
      - "YELLOW"
      - "WHITE"

  sound:
    # Activa el sonido de victoria.
    enabled: true

    # Nombre del sonido (enum Bukkit Sound).
    name: "ENTITY_FIREWORK_ROCKET_LAUNCH"

    # Volumen (0.0 – 1.0+).
    volume: 1.0

    # Tono (0.5 = grave, 2.0 = agudo).
    pitch: 1.0

  nearby-title:
    # Envía un título de victoria a jugadores cercanos fuera de salas.
    enabled: true

    # Radio en bloques desde la posición del ganador.
    radius: 10.0

    # Placeholders disponibles: %winner%, %room%
    title: "&6%winner% &ewon!"
    subtitle: "&7Room: &f%room%"

    # Animación del título (en ticks: 20 ticks = 1 segundo).
    fade-in: 10
    stay: 40
    fade-out: 10

# ================================================================
# Efectos al entrar a una sala CLAN
# ================================================================
clan-join-effects:
  # Activa todos los efectos de esta sección.
  enabled: true

  title:
    # Activa el título de bienvenida al entrar a sala CLAN.
    enabled: true
    # Placeholders: %room%, %clan%
    text: "&6&lCLAN ROOM"
    subtitle: "&f%room% &7- &6%clan%"
    fade-in: 10
    stay: 40
    fade-out: 10

  actionbar:
    # Activa el actionbar al entrar a sala CLAN.
    enabled: true
    # Placeholders: %clan%, %room%
    text: "&6Clan: &f%clan% &8| &eRoom: &f%room%"

  sound:
    # Activa el sonido al entrar a sala CLAN.
    enabled: true
    # Nombre del sonido (enum Bukkit Sound).
    name: "BLOCK_BEACON_ACTIVATE"
    volume: 1.0
    pitch: 1.15
